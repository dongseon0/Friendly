behaviors:
  HorrorAI:
    trainer_type: ppo
    hyperparameters:
      batch_size: 512
      buffer_size: 5120
      learning_rate: 2.0e-4
      learning_rate_schedule: linear
      beta: 8.0e-3
      epsilon: 0.2
      lambd: 0.95
      num_epoch: 3
    network_settings:
      normalize: true
      hidden_units: 256
      num_layers: 3
      memory:
        sequence_length: 32
        memory_size: 256
    reward_signals:
      extrinsic:
        gamma: 0.995
        strength: 1.0
      curiosity:
        gamma: 0.99
        strength: 0.05
        encoding_size: 64
        learning_rate: 1.0e-3
    max_steps: 1000000
    time_horizon: 128
    summary_freq: 2000
    keep_checkpoints: 5
    checkpoint_interval: 50000